<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>HRM Chấm công — Geofence (Socket.io)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <script src="https://unpkg.com/lucide@0.460.0"></script>
</head>
<body class="min-h-screen bg-slate-100 flex justify-center items-start pt-4 pb-8 font-sans text-slate-900">
  <!-- Khung điện thoại -->
  <div class="w-full max-w-[400px] bg-slate-50 rounded-[2rem] shadow-2xl overflow-hidden border border-slate-200 min-h-[720px] flex flex-col">
    <div class="h-32 bg-cyan-50/80 rounded-b-[2rem] -mb-16 shrink-0"></div>

    <header class="relative z-10 flex justify-between items-center px-6 pt-8 pb-2">
      <div class="flex items-center gap-3">
        <div class="relative">
          <img src="https://i.pravatar.cc/150?u=12" alt="" class="w-11 h-11 rounded-full border-2 border-white shadow" />
          <span class="absolute bottom-0 right-0 w-3 h-3 bg-emerald-500 rounded-full border-2 border-white"></span>
        </div>
        <div>
          <p class="text-xs text-slate-500 font-medium">Xin chào,</p>
          <p class="text-base font-extrabold">Nhân viên</p>
        </div>
      </div>
      <button type="button" id="btn-logout" class="w-11 h-11 rounded-full bg-white shadow flex items-center justify-center text-slate-500">
        <i data-lucide="log-out" class="w-5 h-5"></i>
      </button>
    </header>

    <main class="relative z-10 flex-1 px-5 flex flex-col">
      <div class="text-center mt-4 mb-6">
        <p id="date-line" class="text-sm text-slate-500 font-medium mb-1"></p>
        <p id="clock-line" class="text-6xl font-black tracking-tight text-slate-900"></p>
        <button type="button" id="open-map-btn" class="mt-4 inline-flex items-center gap-2 px-4 py-2 rounded-full bg-white border shadow-sm text-xs font-bold">
          <i data-lucide="map" class="w-4 h-4 text-cyan-600"></i>
          Xem bản đồ vùng
        </button>
      </div>

      <!-- Badge vị trí (Emerald / Rose động) -->
      <div id="zone-badge" class="mx-auto flex items-center gap-2.5 px-4 py-2.5 rounded-full bg-white border shadow-sm max-w-full transition-colors duration-300">
        <div id="zone-icon-wrap" class="w-7 h-7 rounded-full flex items-center justify-center bg-emerald-50">
          <i data-lucide="map-pin" id="zone-icon" class="w-3.5 h-3.5 text-emerald-600"></i>
        </div>
        <div class="text-left min-w-0">
          <p id="zone-title" class="text-xs font-extrabold text-emerald-700 truncate">Đang xác định...</p>
          <p id="zone-sub" class="text-[10px] text-slate-400 font-medium">GPS</p>
        </div>
      </div>

      <!-- Nút chấm công + overlay grace -->
      <div class="flex-1 flex flex-col justify-center items-center py-6 relative">
        <div id="pulse-ring" class="absolute w-[min(75vw,280px)] h-[min(75vw,280px)] rounded-full opacity-20 pointer-events-none transition-colors duration-300 bg-cyan-500"></div>
        <div class="relative w-[min(60vw,220px)] h-[min(60vw,220px)]">
          <button type="button" id="punch-btn" class="relative z-10 w-full h-full rounded-full shadow-xl flex flex-col items-center justify-center text-white transition-colors duration-300 bg-cyan-500">
            <i data-lucide="fingerprint" id="punch-icon" class="w-14 h-14 mb-1"></i>
            <span id="punch-text" class="text-2xl font-black">VÀO CA</span>
            <span id="punch-sub" class="text-xs opacity-80 mt-0.5">Nhấn để bắt đầu</span>
          </button>
          <div id="punch-leave-overlay" class="hidden absolute inset-0 z-20 rounded-full bg-rose-600 flex flex-col items-center justify-center text-center px-4 shadow-lg border-4 border-rose-800">
            <i data-lucide="alert-triangle" class="w-10 h-10 text-white mb-2"></i>
            <p class="text-white font-black text-sm leading-tight">BẠN ĐÃ RA NGOÀI VÙNG!</p>
            <p class="text-white/95 text-xs font-bold mt-2">Quay lại trong <span id="grace-mmss">05:00</span></p>
          </div>
        </div>
      </div>

      <!-- Thống kê -->
      <div class="grid grid-cols-3 gap-0 bg-white rounded-3xl p-4 shadow-md mb-4">
        <div class="text-center">
          <div class="w-9 h-9 mx-auto rounded-full bg-slate-100 flex items-center justify-center mb-2">
            <i data-lucide="log-in" class="w-4 h-4 text-emerald-500"></i>
          </div>
          <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wide">Giờ vào</p>
          <p id="stat-in" class="text-base font-black text-slate-300 mt-1">--:--</p>
        </div>
        <div class="text-center border-x border-slate-100">
          <div class="w-9 h-9 mx-auto rounded-full bg-slate-100 flex items-center justify-center mb-2">
            <i data-lucide="clock" class="w-4 h-4 text-cyan-500"></i>
          </div>
          <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wide">Tổng giờ</p>
          <p id="stat-total" class="text-base font-black text-slate-300 mt-1">--:--</p>
        </div>
        <div class="text-center">
          <div class="w-9 h-9 mx-auto rounded-full bg-slate-100 flex items-center justify-center mb-2">
            <i data-lucide="log-out" class="w-4 h-4 text-rose-500"></i>
          </div>
          <p class="text-[10px] font-extrabold text-slate-400 uppercase tracking-wide">Giờ ra</p>
          <p id="stat-out" class="text-base font-black text-slate-300 mt-1">--:--</p>
        </div>
      </div>
    </main>

    <nav class="bg-white rounded-t-[2rem] shadow-[0_-8px_30px_rgba(0,0,0,0.06)] py-4 flex justify-around shrink-0">
      <div class="flex flex-col items-center w-[70px] text-slate-400">
        <i data-lucide="home" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1">Trang chủ</span>
      </div>
      <div class="flex flex-col items-center w-[70px] text-cyan-600 font-bold relative">
        <span class="absolute -top-4 w-10 h-1 bg-cyan-500 rounded-full"></span>
        <i data-lucide="fingerprint" class="w-7 h-7"></i>
        <span class="text-[10px] mt-1">Chấm công</span>
      </div>
      <div class="flex flex-col items-center w-[70px] text-slate-400">
        <i data-lucide="file-text" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1">Đơn từ</span>
      </div>
      <div class="flex flex-col items-center w-[70px] text-slate-400">
        <i data-lucide="user" class="w-6 h-6"></i>
        <span class="text-[10px] mt-1">Hồ sơ</span>
      </div>
    </nav>
  </div>

  <!-- Toast -->
  <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 max-w-[90vw] px-4 py-3 rounded-xl text-white text-sm font-semibold shadow-lg z-[100] hidden text-center"></div>

  <!-- Bottom sheet bản đồ -->
  <div id="map-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40" data-close-map></div>
    <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-3xl shadow-2xl max-h-[85vh] flex flex-col animate-[slideUp_0.25s_ease-out]">
      <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mt-3 mb-2"></div>
      <div class="px-5 pb-2 flex justify-between items-center border-b border-slate-100">
        <h2 class="text-lg font-black text-slate-800">Vùng chấm công</h2>
        <button type="button" class="p-2 rounded-full hover:bg-slate-100" data-close-map>
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>
      <div class="p-5 flex-1 overflow-auto">
        <div id="map-stage" class="relative mx-auto w-full max-w-[320px] h-[220px] bg-slate-50 rounded-2xl border border-slate-200 overflow-hidden">
          <!-- Vòng geofence (emerald) -->
          <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-[160px] h-[160px] rounded-full border-[3px] border-emerald-400/90 bg-emerald-500/10 shadow-inner"></div>
          <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 w-2 h-2 rounded-full bg-emerald-600 ring-2 ring-white z-[1]"></div>
          <!-- Pin người dùng -->
          <div id="user-pin" class="absolute z-[2] w-4 h-4 rounded-full bg-cyan-500 border-2 border-white shadow-md -translate-x-1/2 -translate-y-1/2 left-1/2 top-1/2 transition-all duration-500 ease-out"></div>
        </div>
        <div id="map-distance-box" class="mt-4 p-4 rounded-2xl border transition-colors duration-300 bg-emerald-50 border-emerald-200">
          <div class="flex items-center gap-3">
            <div id="map-box-icon-wrap" class="w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center shrink-0">
              <i data-lucide="map-pin" id="map-box-icon" class="w-5 h-5 text-emerald-600"></i>
            </div>
            <div>
              <p id="map-distance-line" class="text-sm font-black text-emerald-800">Cách tâm — m</p>
              <p class="text-xs text-emerald-700/80 font-medium mt-0.5">So với tâm vùng chấm công</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <style>
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
  </style>

  <script>
    (function () {
      const SOCKET_URL = 'http://localhost:5000';
      const API_BASE = 'http://localhost:5000/api';
      /** Thay bằng JWT thật sau đăng nhập, hoặc lưu localStorage.setItem('jwt', '...') */
      const JWT_TOKEN_HERE = localStorage.getItem('jwt') || 'JWT_TOKEN_HERE';

      const CENTER_LAT = 21.0285;
      const CENTER_LNG = 105.8542;
      const UI_INSIDE_M = 100; /* Ngưỡng hiển thị Emerald / Rose trên UI */
      const MAP_SCALE_M = 120; /* Quãng đường tối đa hiển thị hết bán kính “sân” bản đồ mini */
      const STAGE_R_PX = 72; /* Bán kính vòng emerald trong #map-stage (px) — khớp ~80px circle */

      let socket = null;
      let watchId = null;
      let trackTimer = null;
      let graceTimer = null;
      let graceEndsAt = 0;
      /** Đồng bộ server: đang trong ca (đã check-in, chưa check-out) */
      let isPunchedIn = false;
      let lastAcc = { lat: CENTER_LAT, lng: CENTER_LNG, accuracy: 20 };
      let employeeId = null;
      let checkInIso = null;
      let checkOutIso = null;

      const $ = (sel) => document.querySelector(sel);

      function haversineM(aLat, aLng, bLat, bLng) {
        const R = 6371000;
        const dLat = ((bLat - aLat) * Math.PI) / 180;
        const dLng = ((bLng - aLng) * Math.PI) / 180;
        const la1 = (aLat * Math.PI) / 180;
        const la2 = (bLat * Math.PI) / 180;
        const x =
          Math.sin(dLat / 2) ** 2 +
          Math.cos(la1) * Math.cos(la2) * Math.sin(dLng / 2) ** 2;
        return 2 * R * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
      }

      function bearingRad(lat1, lng1, lat2, lng2) {
        const φ1 = (lat1 * Math.PI) / 180;
        const φ2 = (lat2 * Math.PI) / 180;
        const Δλ = ((lng2 - lng1) * Math.PI) / 180;
        const y = Math.sin(Δλ) * Math.cos(φ2);
        const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
        return Math.atan2(y, x);
      }

      function fmtTime(d) {
        return d.toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit', hour12: false });
      }

      function fmtMMSS(totalSec) {
        const s = Math.max(0, Math.floor(totalSec));
        const m = Math.floor(s / 60);
        const r = s % 60;
        return `${String(m).padStart(2, '0')}:${String(r).padStart(2, '0')}`;
      }

      function lucideRefresh() {
        if (window.lucide && typeof lucide.createIcons === 'function') lucide.createIcons();
      }

      function showToast(msg, kind) {
        const el = $('#toast');
        el.textContent = msg;
        el.classList.remove('hidden', 'bg-slate-900', 'bg-rose-700');
        el.classList.add(kind === 'error' ? 'bg-rose-700' : 'bg-slate-900');
        el.classList.remove('hidden');
        clearTimeout(showToast._t);
        showToast._t = setTimeout(() => el.classList.add('hidden'), 5000);
      }

      function setPunchedIn(val) {
        isPunchedIn = !!val;
        renderPunchButton();
      }

      function renderPunchButton() {
        const btn = $('#punch-btn');
        const text = $('#punch-text');
        const sub = $('#punch-sub');
        const ring = $('#pulse-ring');
        const icon = $('#punch-icon');

        const hasOut = checkOutIso != null;
        if (hasOut) {
          btn.className =
            'relative z-10 w-full h-full rounded-full shadow-xl flex flex-col items-center justify-center text-white transition-colors duration-300 bg-slate-400';
          text.textContent = 'XONG CA';
          sub.textContent = 'Hẹn gặp lại bạn mai';
          icon.setAttribute('data-lucide', 'check-circle');
          ring.className =
            'absolute w-[min(75vw,280px)] h-[min(75vw,280px)] rounded-full opacity-20 pointer-events-none transition-colors duration-300 bg-slate-400';
          btn.disabled = true;
        } else if (isPunchedIn) {
          btn.className =
            'relative z-10 w-full h-full rounded-full shadow-xl flex flex-col items-center justify-center text-white transition-colors duration-300 bg-orange-500';
          text.textContent = 'TAN CA';
          sub.textContent = 'Nhấn để kết thúc';
          icon.setAttribute('data-lucide', 'power');
          ring.className =
            'absolute w-[min(75vw,280px)] h-[min(75vw,280px)] rounded-full opacity-20 pointer-events-none transition-colors duration-300 bg-orange-500';
          btn.disabled = false;
        } else {
          btn.className =
            'relative z-10 w-full h-full rounded-full shadow-xl flex flex-col items-center justify-center text-white transition-colors duration-300 bg-cyan-500';
          text.textContent = 'VÀO CA';
          sub.textContent = 'Nhấn để bắt đầu';
          icon.setAttribute('data-lucide', 'fingerprint');
          ring.className =
            'absolute w-[min(75vw,280px)] h-[min(75vw,280px)] rounded-full opacity-20 pointer-events-none transition-colors duration-300 bg-cyan-500';
          btn.disabled = false;
        }
        lucideRefresh();
      }

      function updateStatsDisplay() {
        const elIn = $('#stat-in');
        const elOut = $('#stat-out');
        const elTot = $('#stat-total');
        if (checkInIso) {
          elIn.textContent = fmtTime(new Date(checkInIso));
          elIn.classList.remove('text-slate-300');
          elIn.classList.add('text-emerald-600');
        } else {
          elIn.textContent = '--:--';
          elIn.classList.add('text-slate-300');
          elIn.classList.remove('text-emerald-600');
        }
        if (checkOutIso) {
          elOut.textContent = fmtTime(new Date(checkOutIso));
          elOut.classList.remove('text-slate-300');
          elOut.classList.add('text-rose-600');
        } else {
          elOut.textContent = '--:--';
          elOut.classList.add('text-slate-300');
          elOut.classList.remove('text-rose-600');
        }
        elTot.textContent = computeTotalHours();
        if (checkInIso) {
          elTot.classList.remove('text-slate-300');
          elTot.classList.add('text-cyan-600');
        } else {
          elTot.classList.add('text-slate-300');
          elTot.classList.remove('text-cyan-600');
        }
      }

      function computeTotalHours() {
        if (!checkInIso) return '--:--';
        const start = new Date(checkInIso).getTime();
        const end = checkOutIso ? new Date(checkOutIso).getTime() : Date.now();
        if (Number.isNaN(start)) return '--:--';
        let diff = Math.max(0, end - start);
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
      }

      function applyAttendancePayload(att) {
        if (!att) return;
        const cin = att.check_in_time ?? att.checkInTime;
        const cout = att.check_out_time ?? att.checkOutTime;
        checkInIso = cin || null;
        checkOutIso = cout || null;
        setPunchedIn(!!cin && !cout);
        updateStatsDisplay();
      }

      async function fetchSummary() {
        if (!employeeId || JWT_TOKEN_HERE === 'JWT_TOKEN_HERE') return;
        try {
          const r = await fetch(`${API_BASE}/employee/attendance/summary/${employeeId}`, {
            headers: { Authorization: `Bearer ${JWT_TOKEN_HERE}` },
          });
          const body = await r.json();
          const data = body.data ?? body;
          const att = data.attendanceToday ?? data.attendance_today ?? data.attendance;
          if (att) applyAttendancePayload(att);
        } catch (e) {
          console.warn('fetchSummary', e);
        }
      }

      function updateDistanceUI(distM) {
        const inside = distM < UI_INSIDE_M;
        const badge = $('#zone-badge');
        const wrap = $('#zone-icon-wrap');
        const title = $('#zone-title');
        const sub = $('#zone-sub');
        const zIcon = $('#zone-icon');

        title.textContent = inside ? 'Trong vùng chấm công' : 'Ngoài vùng cho phép';
        sub.textContent = `Cách tâm ${Math.round(distM)}m`;

        if (inside) {
          badge.className =
            'mx-auto flex items-center gap-2.5 px-4 py-2.5 rounded-full bg-white border border-emerald-100 shadow-sm max-w-full transition-colors duration-300';
          wrap.className = 'w-7 h-7 rounded-full flex items-center justify-center bg-emerald-50';
          zIcon.setAttribute('data-lucide', 'map-pin');
          title.className = 'text-xs font-extrabold text-emerald-700 truncate';
        } else {
          badge.className =
            'mx-auto flex items-center gap-2.5 px-4 py-2.5 rounded-full bg-white border border-rose-100 shadow-sm max-w-full transition-colors duration-300';
          wrap.className = 'w-7 h-7 rounded-full flex items-center justify-center bg-rose-50';
          zIcon.setAttribute('data-lucide', 'alert-triangle');
          title.className = 'text-xs font-extrabold text-rose-700 truncate';
        }
        lucideRefresh();

        const box = $('#map-distance-box');
        const mwrap = $('#map-box-icon-wrap');
        const mline = $('#map-distance-line');
        const mIcon = $('#map-box-icon');
        mline.textContent = `Cách tâm ${Math.round(distM)}m`;
        if (inside) {
          box.className = 'mt-4 p-4 rounded-2xl border transition-colors duration-300 bg-emerald-50 border-emerald-200';
          mwrap.className = 'w-10 h-10 rounded-xl bg-emerald-100 flex items-center justify-center shrink-0';
          mIcon.setAttribute('data-lucide', 'map-pin');
          mline.className = 'text-sm font-black text-emerald-800';
        } else {
          box.className = 'mt-4 p-4 rounded-2xl border transition-colors duration-300 bg-rose-50 border-rose-200';
          mwrap.className = 'w-10 h-10 rounded-xl bg-rose-100 flex items-center justify-center shrink-0';
          mIcon.setAttribute('data-lucide', 'alert-triangle');
          mline.className = 'text-sm font-black text-rose-800';
        }
        lucideRefresh();

        const pin = $('#user-pin');
        const br = bearingRad(CENTER_LAT, CENTER_LNG, lastAcc.lat, lastAcc.lng);
        const d = Math.min(distM, MAP_SCALE_M);
        const px = (d / MAP_SCALE_M) * STAGE_R_PX;
        const cx = 160;
        const cy = 110;
        const x = cx + Math.sin(br) * px;
        const y = cy - Math.cos(br) * px;
        pin.style.left = x + 'px';
        pin.style.top = y + 'px';
      }

      function startGraceCountdown(ms) {
        graceEndsAt = Date.now() + ms;
        $('#punch-leave-overlay').classList.remove('hidden');
        lucideRefresh();
        if (graceTimer) clearInterval(graceTimer);
        graceTimer = setInterval(() => {
          const left = Math.ceil((graceEndsAt - Date.now()) / 1000);
          $('#grace-mmss').textContent = fmtMMSS(left);
          if (left <= 0) {
            clearInterval(graceTimer);
            graceTimer = null;
            $('#punch-leave-overlay').classList.add('hidden');
          }
        }, 250);
      }

      function stopGraceOverlay() {
        if (graceTimer) clearInterval(graceTimer);
        graceTimer = null;
        $('#punch-leave-overlay').classList.add('hidden');
      }

      function connectSocket() {
        if (socket) socket.disconnect();
        socket = io(SOCKET_URL, { transports: ['websocket', 'polling'] });

        socket.on('connect', () => {
          socket.emit('authenticate_tracking', { token: JWT_TOKEN_HERE });
        });

        socket.on('tracking_authenticated', (reply) => {
          if (reply && reply.employee_id != null) employeeId = reply.employee_id;
          void fetchSummary();
        });

        socket.on('tracking_error', (err) => {
          showToast(err.message || 'Lỗi socket', 'error');
        });

        socket.on('geofence_leave_warning', (payload) => {
          const ms = typeof payload.grace_ms === 'number' ? payload.grace_ms : 5 * 60 * 1000;
          startGraceCountdown(ms);
        });

        socket.on('geofence_auto_checkin', (payload) => {
          stopGraceOverlay();
          setPunchedIn(true);
          const d = payload?.data;
          if (d?.check_in_time) checkInIso = d.check_in_time;
          else checkInIso = new Date().toISOString();
          updateStatsDisplay();
          showToast(payload?.message || 'Đã tự động check-in.', 'ok');
          void fetchSummary();
        });

        socket.on('geofence_auto_checkout', (payload) => {
          stopGraceOverlay();
          setPunchedIn(false);
          const d = payload?.data;
          if (d?.check_out_time) checkOutIso = d.check_out_time;
          updateStatsDisplay();
          showToast(payload?.message || 'Đã tự động check-out.', 'error');
          void fetchSummary();
        });

        socket.on('attendance_changed', (payload) => {
          if (employeeId != null && String(payload.employee_id) === String(employeeId)) {
            void fetchSummary();
          }
        });
      }

      function emitTrack() {
        if (!socket || !socket.connected) return;
        socket.emit('track_location', {
          latitude: lastAcc.lat,
          longitude: lastAcc.lng,
          accuracy: lastAcc.accuracy,
        });
      }

      function startGeolocation() {
        if (!navigator.geolocation) {
          showToast('Trình duyệt không hỗ trợ Geolocation', 'error');
          return;
        }
        watchId = navigator.geolocation.watchPosition(
          (pos) => {
            lastAcc = {
              lat: pos.coords.latitude,
              lng: pos.coords.longitude,
              accuracy: pos.coords.accuracy,
            };
            const dist = haversineM(CENTER_LAT, CENTER_LNG, lastAcc.lat, lastAcc.lng);
            updateDistanceUI(dist);
          },
          (err) => showToast('GPS: ' + err.message, 'error'),
          { enableHighAccuracy: true, maximumAge: 10000, timeout: 20000 }
        );
        if (trackTimer) clearInterval(trackTimer);
        trackTimer = setInterval(emitTrack, 20000);
        emitTrack();
      }

      function tickClock() {
        const now = new Date();
        $('#date-line').textContent = now.toLocaleDateString('vi-VN', {
          weekday: 'long',
          day: 'numeric',
          month: 'long',
          year: 'numeric',
        });
        $('#clock-line').textContent = fmtTime(now);
        if (isPunchedIn && !checkOutIso) updateStatsDisplay();
      }

      $('#open-map-btn').addEventListener('click', () => {
        $('#map-modal').classList.remove('hidden');
        const dist = haversineM(CENTER_LAT, CENTER_LNG, lastAcc.lat, lastAcc.lng);
        updateDistanceUI(dist);
        lucideRefresh();
      });
      document.querySelectorAll('[data-close-map]').forEach((el) => {
        el.addEventListener('click', () => $('#map-modal').classList.add('hidden'));
      });

      $('#punch-btn').addEventListener('click', () => {
        if ($('#punch-btn').disabled) return;
        showToast('Bản web demo: dùng app mobile hoặc API để chấm công thủ công.', 'ok');
      });

      $('#btn-logout').addEventListener('click', () => {
        if (watchId != null) navigator.geolocation.clearWatch(watchId);
        if (trackTimer) clearInterval(trackTimer);
        stopGraceOverlay();
        if (socket) socket.disconnect();
        showToast('Đã ngắt theo dõi (demo).', 'ok');
      });

      lucideRefresh();
      tickClock();
      setInterval(tickClock, 1000);
      connectSocket();
      startGeolocation();
      updateDistanceUI(haversineM(CENTER_LAT, CENTER_LNG, lastAcc.lat, lastAcc.lng));
      renderPunchButton();
      updateStatsDisplay();
    })();
  </script>
</body>
</html>
